name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: true
        default: "v1.5.45"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish vmlx
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Validate release ref
        env:
          PUBLISH_REF: ${{ inputs.ref }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib

          ref = os.environ["PUBLISH_REF"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", ref):
              print(f"Ref must be a version tag like v1.5.45, got {ref!r}", file=sys.stderr)
              raise SystemExit(1)

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          expected = f"v{version}"
          if ref != expected:
              print(f"Ref {ref!r} does not match pyproject.toml version {version!r}", file=sys.stderr)
              raise SystemExit(1)

          print(f"Publishing {expected}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
